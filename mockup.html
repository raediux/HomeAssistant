<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grocery Autocomplete Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111110; --surface: #1c1c1a; --border: #2e2e2b;
  --text: #e8e6e1; --text2: #9e9b93; --text3: #6b6960;
  --blue: #4a8fd4; --r: 8px;
}
body {
  background: radial-gradient(ellipse at 65% 0%, #10131a 0%, #0d0e12 45%, #0c0d10 100%);
  font-family: 'DM Sans', system-ui, sans-serif;
  color: var(--text); min-height: 100vh;
  display: flex; gap: 48px; padding: 48px; align-items: flex-start; flex-wrap: wrap;
}
.scenario-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 14px; }

/* Modal box */
.modal-box {
  background: #1a1a18;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  width: 300px;
  box-shadow: 0 16px 48px rgba(0,0,0,.6);
}
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-hdr span { font-size: 14px; font-weight: 600; }
.modal-x { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px; display: flex; align-items: center; }
.modal-lbl { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 6px; }
.modal-input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: var(--r); padding: 9px 11px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none;
}
.modal-input:focus { border-color: rgba(74,143,212,.5); }
select.modal-input { cursor: pointer; }
.modal-ftr { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 14px; font-size: 13px; font-family: inherit; color: var(--text2); cursor: pointer; }
.btn-glass { background: rgba(74,143,212,0.15); border-color: rgba(74,143,212,0.3); color: var(--blue); }

/* Input wrapper for positioning */
.input-wrap { position: relative; margin-bottom: 12px; }

/* Suggestions dropdown */
.suggestions {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 10;
  background: #222220;
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  overflow: hidden;
}
.suggestion-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 11px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item.active { background: rgba(255,255,255,0.05); }
.sug-name { flex: 1; font-size: 13px; }
.sug-name em { font-style: normal; color: var(--blue); }
.sug-store { font-size: 11px; color: var(--text3); background: rgba(255,255,255,0.05); border-radius: 4px; padding: 2px 5px; white-space: nowrap; }
</style>
</head>
<body>

<!-- State 1: typing, suggestions visible -->
<div>
  <div class="scenario-label">Typing — suggestions shown</div>
  <div class="modal-box">
    <div class="modal-hdr">
      <span>Add item</span>
      <button class="modal-x"><i class="ti ti-x"></i></button>
    </div>
    <label class="modal-lbl">Item name</label>
    <div class="input-wrap">
      <input class="modal-input" type="text" value="mil" style="border-color:rgba(74,143,212,.5)">
      <div class="suggestions">
        <div class="suggestion-item active">
          <span class="sug-name"><em>Mil</em>k</span>
          <span class="sug-store">Coles</span>
        </div>
        <div class="suggestion-item">
          <span class="sug-name"><em>Mil</em>k (full cream)</span>
          <span class="sug-store">Woolworths</span>
        </div>
        <div class="suggestion-item">
          <span class="sug-name">Oat <em>mil</em>k</span>
          <span class="sug-store">Aldi</span>
        </div>
      </div>
    </div>
    <label class="modal-lbl">Store</label>
    <select class="modal-input">
      <option>Coles</option>
    </select>
    <div class="modal-ftr">
      <button class="btn">Cancel</button>
      <button class="btn btn-glass"><i class="ti ti-plus"></i> Add to list</button>
    </div>
  </div>
</div>

<!-- State 2: suggestion selected, form filled -->
<div>
  <div class="scenario-label">Suggestion selected — form filled</div>
  <div class="modal-box">
    <div class="modal-hdr">
      <span>Add item</span>
      <button class="modal-x"><i class="ti ti-x"></i></button>
    </div>
    <label class="modal-lbl">Item name</label>
    <div class="input-wrap">
      <input class="modal-input" type="text" value="Milk" style="border-color:rgba(74,143,212,.5)">
      <!-- no dropdown -->
    </div>
    <label class="modal-lbl">Store</label>
    <select class="modal-input">
      <option>Coles</option>
    </select>
    <div class="modal-ftr">
      <button class="btn">Cancel</button>
      <button class="btn btn-glass"><i class="ti ti-plus"></i> Add to list</button>
    </div>
  </div>
</div>

</body>
</html>

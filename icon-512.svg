<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141619"/>
      <stop offset="100%" stop-color="#0c0d10"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="rgba(74,143,212,0.58)"/>
      <stop offset="55%" stop-color="rgba(74,143,212,0.22)"/>
      <stop offset="100%" stop-color="rgba(74,143,212,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Prominent blue glow -->
  <ellipse cx="96" cy="86" rx="88" ry="74" fill="url(#glow)"/>
  <!-- Glass sheen -->
  <rect width="192" height="192" rx="38" fill="url(#sheen)"/>
  <!-- House outline -->
  <path d="M56,86 L96,38 L136,86 L136,130 L56,130 Z" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="84" y="109" width="24" height="21" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8"/>
  <!-- Text -->
  <text x="96" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="rgba(255,255,255,0.90)" text-anchor="middle" letter-spacing="-0.2">Home</text>
  <text x="96" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="rgba(255,255,255,0.90)" text-anchor="middle" letter-spacing="-0.2">Assistant</text>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="191" height="191" rx="37.5" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
</svg>
